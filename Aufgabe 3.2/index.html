<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Seite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #16213e;
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #0f3460;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #e94560; }
        p { color: #aaa; font-size: 1.1rem; }
        .badge {
            margin-top: 20px;
            background: #0f3460;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Läuft!</h1>
        <p>Meine Webseite läuft im nginx Container</p>
        <span class="badge">Docker · nginx · M109</span>
    </div>
</body>
</html>
